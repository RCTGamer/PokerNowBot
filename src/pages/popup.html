<html>
  <head>
    <style>
      body {
        width: 380px;
        font-family: system-ui, -apple-system, sans-serif;
        margin: 0;
        padding: 12px;
        background: #1a1a1a;
        color: #e0e0e0;
      }
      h4 { margin: 0 0 8px 0; }
      .row { display: flex; gap: 6px; align-items: center; margin: 6px 0; }
      .row > * { flex: 0 0 auto; }
      .row .grow { flex: 1 1 auto; }
      button {
        background: #2d2d2d;
        color: #e0e0e0;
        border: 1px solid #444;
        border-radius: 3px;
        padding: 6px 10px;
        cursor: pointer;
        font: inherit;
      }
      button:hover { background: #3d3d3d; }

      .pokerbot-handgrid {
        display: grid;
        grid-template-columns: 18px repeat(13, 1fr);
        grid-auto-rows: 22px;
        gap: 1px;
        user-select: none;
        margin: 8px 0;
      }
      .pokerbot-handgrid-corner { background: transparent; }
      .pokerbot-handgrid-colhead,
      .pokerbot-handgrid-rowhead {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        color: #888;
      }
      .pokerbot-handgrid-cell {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        line-height: 1.05;
        padding: 0;
        border-radius: 2px;
        border: 1px solid #333;
        background: #2a2a2a;
        color: #c8e6c9;
        cursor: pointer;
      }
      .pokerbot-handgrid-cell:hover { filter: brightness(1.2); }
      .pokerbot-handgrid-cell.pokerbot-folded {
        background: #5a2828;
        color: #ffcdd2;
      }
      .pokerbot-handgrid-cell.pokerbot-played {
        background: #1f3a1f;
      }

      /* Diagonal split: each off-diagonal cell shows a thin diagonal line so
         the user can see which triangle (suited top-right, offsuit bottom-left)
         each cell belongs to. */
      .pokerbot-handgrid-cell.pokerbot-suited,
      .pokerbot-handgrid-cell.pokerbot-offsuit {
        background-image: linear-gradient(
          to top right,
          transparent calc(50% - 0.5px),
          #777 calc(50% - 0.5px),
          #777 calc(50% + 0.5px),
          transparent calc(50% + 0.5px)
        );
      }
      .pokerbot-handgrid-cell-pair .pokerbot-handgrid-half {
        width: 100%;
        text-align: center;
      }
      .pokerbot-handgrid-cell-pair small {
        font-size: 8px;
        opacity: 0.7;
      }

      .pokerbot-section {
        margin-top: 12px;
        padding-top: 8px;
        border-top: 1px solid #333;
      }
      .pokerbot-section-title {
        font-size: 11px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }
      .pokerbot-help {
        font-size: 10px;
        color: #888;
        margin: 4px 0;
      }
    </style>
  </head>
  <body>
    <h4>Pokerclub bot</h4>

    <div class="row">
      <span>status: <span id="bot-status">off</span></span>
      <span class="grow"></span>
    </div>

    <div class="row">
      <span>last action: <span id="bot-debug">—</span></span>
    </div>

    <div class="row">
      <button id="start-bot">start bot</button>
      <button id="kill-bot">kill bot</button>
      <button id="debug-bot">debug</button>
    </div>

    <div class="pokerbot-section">
      <div class="pokerbot-section-title">Preflop auto-fold</div>
      <div class="pokerbot-help">green = bot plays, red = bot auto-folds. click to toggle.</div>
      <div id="hand-grid"></div>
      <div class="row">
        <label><input type="checkbox" id="beep-toggle"> beep on hands you play</label>
        <span class="grow"></span>
        <button id="reset-folds">reset</button>
      </div>
    </div>
  </body>
</html>
